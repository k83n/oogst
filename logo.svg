<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Oogst: losjes getekende korenschoof — drie halmen met volle aren,
       een touwtje met afhangend eindje, en wat vallende korrels.
       Bewust wiebelig: handgetekend, niet geometrisch. -->
  <g stroke="#e8b04b" stroke-linecap="round">
    <!-- halmen (boven de knoop) -->
    <path d="M59.6 77.8 C58.9 64.1 61.2 52.2 59.9 40.4" stroke-width="2.9"/>
    <path d="M57.8 77.2 C50.1 65.8 43.9 56.1 39.4 45.9" stroke-width="2.7"/>
    <path d="M62.1 77.4 C69.4 64.9 75.7 55.4 80.6 45.6" stroke-width="2.6"/>
    <!-- schetslaagje: dunne tweede streek net ernaast -->
    <path d="M61 77 C60.4 64.4 62.1 53.6 61.2 42.9" stroke-width="1" opacity=".3"/>
    <!-- voet (onder de knoop) -->
    <path d="M57.9 80.9 C55.1 88.4 51.2 95.6 46.8 102.1" stroke-width="2.7"/>
    <path d="M60.1 81.2 C60.3 89.1 60.8 96.4 60.2 103.4" stroke-width="2.8"/>
    <path d="M62.2 80.8 C65.9 88.4 69.7 94.9 73.9 101.2" stroke-width="2.6"/>
    <path d="M58.9 81.1 C57.2 88.9 55.3 95.7 53.9 101.9" stroke-width="1.1" opacity=".3"/>
  </g>
  <!-- aren: gevulde korrels, per halm rond de top -->
  <g fill="#e8b04b">
    <!-- middenaar (top ~60,40; recht omhoog) -->
    <ellipse cx="55.7" cy="42.4" rx="4.4" ry="2" transform="rotate(-36 55.7 42.4)"/>
    <ellipse cx="64.4" cy="41.2" rx="4.2" ry="2" transform="rotate(38 64.4 41.2)"/>
    <ellipse cx="55.2" cy="34.6" rx="4.3" ry="2" transform="rotate(-38 55.2 34.6)"/>
    <ellipse cx="64.8" cy="33.4" rx="4.1" ry="1.9" transform="rotate(35 64.8 33.4)"/>
    <ellipse cx="56.4" cy="26.9" rx="4" ry="1.9" transform="rotate(-34 56.4 26.9)"/>
    <ellipse cx="63.6" cy="26.1" rx="3.9" ry="1.9" transform="rotate(37 63.6 26.1)"/>
    <ellipse cx="60.1" cy="19.6" rx="4" ry="1.9" transform="rotate(87 60.1 19.6)"/>
    <!-- linkeraar (top ~39,46; leunt naar linksboven) -->
    <ellipse cx="34.6" cy="44.9" rx="4.1" ry="1.9" transform="rotate(-72 34.6 44.9)"/>
    <ellipse cx="42.9" cy="40.6" rx="4" ry="1.9" transform="rotate(-4 42.9 40.6)"/>
    <ellipse cx="31.9" cy="37.9" rx="4" ry="1.9" transform="rotate(-70 31.9 37.9)"/>
    <ellipse cx="39.6" cy="33.2" rx="3.9" ry="1.8" transform="rotate(-8 39.6 33.2)"/>
    <ellipse cx="33.4" cy="27.4" rx="3.8" ry="1.8" transform="rotate(-42 33.4 27.4)"/>
    <!-- rechteraar (top ~81,46; leunt naar rechtsboven) -->
    <ellipse cx="85.4" cy="44.4" rx="4.1" ry="1.9" transform="rotate(72 85.4 44.4)"/>
    <ellipse cx="77.1" cy="40.2" rx="4" ry="1.9" transform="rotate(6 77.1 40.2)"/>
    <ellipse cx="88.1" cy="37.2" rx="4" ry="1.9" transform="rotate(69 88.1 37.2)"/>
    <ellipse cx="80.4" cy="32.9" rx="3.9" ry="1.8" transform="rotate(10 80.4 32.9)"/>
    <ellipse cx="86.6" cy="26.9" rx="3.8" ry="1.8" transform="rotate(44 86.6 26.9)"/>
  </g>
  <!-- het touwtje: gekruiste wikkel met afhangend eindje -->
  <g stroke="#d4713f" stroke-linecap="round" fill="none">
    <path d="M49.9 76.4 C56.4 80.9 64.4 80.6 70.6 76.1" stroke-width="3.1"/>
    <path d="M50.4 80.9 C56.9 76.6 64.1 76.9 69.9 81.4" stroke-width="3"/>
    <path d="M69.9 81.4 C72.6 84.1 73.4 87.4 72.4 90.6" stroke-width="2.3"/>
    <path d="M72.4 90.6 L69.9 88.9" stroke-width="2"/>
  </g>
  <!-- vallende korrels -->
  <g fill="#e8b04b" opacity=".7">
    <ellipse cx="27.4" cy="60.4" rx="3.1" ry="1.5" transform="rotate(-58 27.4 60.4)"/>
    <ellipse cx="92.1" cy="58.6" rx="3.1" ry="1.5" transform="rotate(52 92.1 58.6)"/>
    <ellipse cx="23.1" cy="76.9" rx="2.9" ry="1.4" transform="rotate(-84 23.1 76.9)"/>
    <ellipse cx="96.4" cy="75.4" rx="2.9" ry="1.4" transform="rotate(80 96.4 75.4)"/>
  </g>
</svg>
